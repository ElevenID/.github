name: Reusable documentation quality

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      build-command:
        type: string
        default: ""
      link-arguments:
        type: string
        default: "--no-progress --exclude-mail"

permissions:
  contents: read

concurrency:
  group: docs-quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Markdown and MDX lint
        shell: bash
        run: npx --yes markdownlint-cli2@0.23.1 "**/*.{md,mdx}" "#node_modules"
      - name: Spelling
        shell: bash
        run: npx --yes cspell@10.0.1 "**/*.{md,mdx}" --no-progress
      - name: Links
        uses: lycheeverse/lychee-action@d3125d12b1c7d9a17e45103c853d03c1207a5ea0 # v2
        with:
          args: ${{ inputs.link-arguments }} '${{ inputs.working-directory }}/**/*.md' '${{ inputs.working-directory }}/**/*.mdx'
          fail: true
      - name: Documentation build
        if: inputs.build-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.build-command }}
        run: bash -euo pipefail -c "$COMMAND"
