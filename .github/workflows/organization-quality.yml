name: Organization Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-quality:
    uses: ElevenID/.github/.github/workflows/quality-workflows.yml@73af6b86115682e0fc6e24195c845ad203aa8b3c
    with:
      policy-ref: 73af6b86115682e0fc6e24195c845ad203aa8b3c

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ElevenID/.github/.github/workflows/dependency-review.yml@73af6b86115682e0fc6e24195c845ad203aa8b3c

  scorecard:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write # Required to upload Scorecard SARIF.
      id-token: write # Required for keyless Scorecard result publishing.
      contents: read
    uses: ElevenID/.github/.github/workflows/scorecard.yml@73af6b86115682e0fc6e24195c845ad203aa8b3c
