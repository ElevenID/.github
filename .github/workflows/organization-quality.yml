name: Organization Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-quality:
    uses: ElevenID/.github/.github/workflows/quality-workflows.yml@9d105f703ae8f34837e633c774178d561c8b3466
    with:
      policy-ref: 9d105f703ae8f34837e633c774178d561c8b3466

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ElevenID/.github/.github/workflows/dependency-review.yml@9d105f703ae8f34837e633c774178d561c8b3466

  scorecard:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write # Required to upload Scorecard SARIF.
      id-token: write # Required for keyless Scorecard result publishing.
      contents: read
    uses: ElevenID/.github/.github/workflows/scorecard.yml@9d105f703ae8f34837e633c774178d561c8b3466
