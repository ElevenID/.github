name: Reusable container and IaC quality

on:
  workflow_call:
    inputs:
      scan-ref:
        type: string
        default: "."
      helm-command:
        type: string
        default: ""
      kubeconform-command:
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: container-quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-quality:
    name: Container and IaC Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: "**/Dockerfile*"
          recursive: true
          failure-threshold: warning
      - name: Filesystem vulnerabilities and misconfiguration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-ref }}
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Checkov IaC policy
        shell: bash
        env:
          SCAN_REF: ${{ inputs.scan-ref }}
        run: |
          python -m pip install --disable-pip-version-check "checkov==3.3.8"
          checkov --directory "$SCAN_REF" --quiet --compact
      - name: Helm validation
        if: inputs.helm-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.helm-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Kubernetes schema validation
        if: inputs.kubeconform-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.kubeconform-command }}
        run: bash -euo pipefail -c "$COMMAND"
