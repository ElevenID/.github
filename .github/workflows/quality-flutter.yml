name: Reusable Flutter quality

on:
  workflow_call:
    inputs:
      flutter-version:
        type: string
        required: true
      working-directory:
        type: string
        default: "."
      test-command:
        type: string
        default: "flutter test --coverage"
      build-command:
        description: Non-Apple debug build command
        type: string
        default: "flutter build web --debug"

permissions:
  contents: read

concurrency:
  group: flutter-quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Flutter Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true
      - name: Install locked dependencies
        shell: bash
        run: flutter pub get --enforce-lockfile
      - name: Check formatting
        shell: bash
        run: dart format --output=none --set-exit-if-changed .
      - name: Static analysis
        shell: bash
        run: flutter analyze --fatal-infos
      - name: Tests and coverage
        shell: bash
        env:
          COMMAND: ${{ inputs.test-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Enforce coverage
        shell: bash
        run: |
          awk -F: '
            $1 == "LF"  { lines_found += $2 }
            $1 == "LH"  { lines_hit += $2 }
            $1 == "BRF" { branches_found += $2 }
            $1 == "BRH" { branches_hit += $2 }
            END {
              if (lines_found == 0) {
                print "coverage/lcov.info contains no line coverage records" > "/dev/stderr"
                exit 2
              }

              line_rate = 100 * lines_hit / lines_found
              printf "Line coverage: %.2f%% (%d/%d); required: 90.00%%\n", line_rate, lines_hit, lines_found
              failed = line_rate + 0.000001 < 90

              if (branches_found > 0) {
                branch_rate = 100 * branches_hit / branches_found
                printf "Branch coverage: %.2f%% (%d/%d); required: 80.00%%\n", branch_rate, branches_hit, branches_found
                if (branch_rate + 0.000001 < 80) failed = 1
              } else {
                print "Branch coverage: unsupported (no BRF/BRH records emitted by Flutter)"
              }

              exit failed
            }
          ' coverage/lcov.info
      - name: Upload Flutter coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flutter-coverage-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14
      - name: Non-Apple debug build
        shell: bash
        env:
          COMMAND: ${{ inputs.build-command }}
        run: bash -euo pipefail -c "$COMMAND"
