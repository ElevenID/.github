name: Reusable Node quality

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      working-directory:
        type: string
        default: "."
      install-command:
        type: string
        default: "npm ci"
      lint-command:
        type: string
        default: "npm run lint"
      type-command:
        type: string
        default: "npm run typecheck"
      test-command:
        type: string
        required: true
      audit-command:
        type: string
        default: "npm audit --audit-level=moderate"
      build-command:
        type: string
        default: "npm run build"
      bundle-command:
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: node-quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-quality:
    name: Node Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install locked dependencies
        shell: bash
        env:
          COMMAND: ${{ inputs.install-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Lint
        shell: bash
        env:
          COMMAND: ${{ inputs.lint-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Type check
        shell: bash
        env:
          COMMAND: ${{ inputs.type-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Tests and coverage
        shell: bash
        env:
          COMMAND: ${{ inputs.test-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Dependency vulnerability audit
        shell: bash
        env:
          COMMAND: ${{ inputs.audit-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Production build
        shell: bash
        env:
          COMMAND: ${{ inputs.build-command }}
        run: bash -euo pipefail -c "$COMMAND"
      - name: Bundle budget
        if: inputs.bundle-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.bundle-command }}
        run: bash -euo pipefail -c "$COMMAND"
