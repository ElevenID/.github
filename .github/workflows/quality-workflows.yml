name: Reusable workflow quality

on:
  workflow_call:
    inputs:
      policy-ref:
        description: Full ElevenID/.github commit containing the policy implementation
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: workflow-quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-quality:
    name: Workflow Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          repository: ElevenID/.github
          ref: ${{ inputs.policy-ref }}
          path: .elevenid-quality
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Validate GitHub Actions syntax
        shell: bash
        env:
          # Gate actionable ShellCheck warnings/errors; info/style findings remain advisory.
          SHELLCHECK_OPTS: --severity=warning
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Audit GitHub Actions security
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check "zizmor==1.27.0"
          zizmor --persona=auditor --min-severity=high --min-confidence=high .github/workflows
      - name: Enforce ElevenID workflow policy
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check "PyYAML==6.0.3"
          python .elevenid-quality/scripts/workflow_policy.py .github/workflows
      - name: Test workflow policy fixtures
        shell: bash
        run: cd .elevenid-quality && python -m unittest discover -s tests -p 'test_*.py'
