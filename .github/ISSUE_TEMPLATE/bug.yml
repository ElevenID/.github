name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, personal data, or security vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps and relevant logs with sensitive values removed.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
